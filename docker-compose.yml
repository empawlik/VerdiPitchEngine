services:
  verdi-pitch-engine:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        BUILD_HASH: ${BUILD_HASH:-unknown}
    image: empawlik/verdi-pitch-engine:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-verdi-pitch-engine-app}
    # Keeps the container sleeping in the background and prints instructions to the logs
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo -e "\n🎶 \033[1;36mVERDI PITCH ENGINE CONTAINER HUB\033[0m 🎶"
        echo -e "\033[1;30m=================================================================\033[0m"
        echo -e "🏷️  \033[1;34mVersion:\033[0m    ${VERSION:-0.3.0} (Build: ${BUILD_HASH:-unknown})"
        echo -e "🎯 \033[1;34mPurpose:\033[0m    High-fidelity lossless batch pitch-shifting (440 Hz -> 432 Hz)"
        echo -e "🟢 \033[1;34mStatus:\033[0m     Engine is standing by in interactive mode"
        echo -e "\033[1;30m-----------------------------------------------------------------\033[0m"
        echo -e "🛠️  \033[1;33mAvailable Commands (via [>_ Execute] terminal):\033[0m"
        echo -e "  \033[1;32mSingle Album:\033[0m  \033[1;36mverdi-process \"Artist/Album\"\033[0m"
        echo -e "  \033[1;32mBatch Folder:\033[0m  \033[1;36mverdi-batch \"Artist\" [limit]\033[0m"
        echo -e "\033[1;30m-----------------------------------------------------------------\033[0m"
        echo -e "⚠️  \033[1;31mSECURITY GUARDRAIL ACTIVE:\033[0m"
        echo -e "   \033[2mExecutions will be instantly denied if Roon, Plex,"
        echo -e "   or MinimServer are detected running on the QNAP host.\033[0m"
        echo -e "   \033[1;33mShut down media servers before triggering batches.\033[0m"
        echo -e "\033[1;30m=================================================================\033[0m\n"
        tail -f /dev/null
    volumes:
      # Mount the entire QNAP music library
      - /share/Multimedia/Audio/Music:/music
    environment:
      - TZ=America/New_York
      - VERDI_WORKERS=${VERDI_WORKERS:-4}
    restart: unless-stopped
    pid: "host"
