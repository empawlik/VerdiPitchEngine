name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  issues: read
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prevent CHANGELOG.md manual modifications in PRs
        if: github.event_name == 'pull_request' && github.head_ref != 'chore/100-core-changelog-links' && !startsWith(github.head_ref, 'release/')
        run: |
          if git diff --name-only origin/main...HEAD | grep -q "^CHANGELOG\.md$"; then
            echo "Error: CHANGELOG.md cannot be modified in a pull request. It is automatically generated."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Install dependencies
        run: mage deps

      - name: Cache Build Tools & Linters
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/golangci-lint
            ~/go/bin/govulncheck
            ~/go/bin/golangci-lint
          key: ${{ runner.os }}-go-tools-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-tools-

      - name: Install golangci-lint
        run: |
          if ! command -v golangci-lint &> /dev/null; then
            echo "golangci-lint not found in cache. Installing..."
            go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          else
            echo "golangci-lint retrieved from cache."
            golangci-lint --version
          fi

      - name: Run checks
        run: mage ci-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
